<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EventCata">
<meta name="theme-color" content="#000000">
<title>EventCata by Ugoo Okogeri</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icons/icon-192.png" type="image/png">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #000;
  --bg2: #0a0a0a;
  --surface: #1c1c1e;
  --surface2: #2c2c2e;
  --surface3: #3a3a3c;
  --border: rgba(255,255,255,0.1);
  --accent: #0A84FF;
  --accent2: #30D158;
  --text: #ffffff;
  --text2: rgba(255,255,255,0.6);
  --text3: rgba(255,255,255,0.35);
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --radius: 16px;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bottom: env(safe-area-inset-bottom, 34px);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ─── SCREENS ─── */
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  transform: translateX(100%);
  transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);
  will-change: transform;
  z-index: 10;
}
.screen.active { transform: translateX(0); z-index: 20; }
.screen.behind  { transform: translateX(-8%); z-index: 10; }

/* ─── NAV BAR ─── */
.navbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: calc(var(--safe-top) + 8px) 20px 12px;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 99;
}
.navbar-title {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.3px;
}
.navbar-large {
  padding: calc(var(--safe-top) + 8px) 20px 6px;
  flex-direction: column;
  align-items: flex-start;
  gap: 4px;
  background: rgba(0,0,0,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.navbar-large .large-title {
  font-size: 34px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.navbar-large .subtitle {
  font-size: 13px;
  color: var(--text2);
  font-weight: 400;
}
.nav-btn {
  background: none;
  border: none;
  color: var(--accent);
  font-size: 15px;
  font-weight: 500;
  font-family: var(--font);
  cursor: pointer;
  padding: 6px 0;
  display: flex;
  align-items: center;
  gap: 4px;
  min-width: 60px;
}
.nav-btn.right { justify-content: flex-end; }
.nav-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

/* ─── SCROLL AREA ─── */
.scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--safe-bottom) + 20px);
}
.scroll::-webkit-scrollbar { display: none; }

/* ─── HOME SCREEN ─── */
#home .search-wrap {
  padding: 12px 16px 8px;
}
.search-bar {
  background: var(--surface);
  border-radius: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 14px;
  color: var(--text2);
  font-size: 15px;
}
.search-bar svg { width: 16px; height: 16px; opacity: 0.6; flex-shrink: 0; }
.search-bar input {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 15px;
  font-family: var(--font);
  flex: 1;
}
.search-bar input::placeholder { color: var(--text2); }

/* ─── FILTER PILLS ─── */
.filter-row {
  display: flex;
  gap: 8px;
  padding: 4px 16px 12px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }
.pill {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text2);
  font-size: 13px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 20px;
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--font);
  flex-shrink: 0;
}
.pill.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* ─── YEAR SECTION ─── */
.year-section { padding: 0 16px; }
.year-label {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  padding: 16px 0 10px;
  letter-spacing: -0.3px;
}

/* ─── EVENT CARD ─── */
.event-card {
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 12px;
  cursor: pointer;
  transition: transform 0.12s, opacity 0.12s;
  border: 1px solid var(--border);
}
.event-card:active { transform: scale(0.97); opacity: 0.85; }

.card-thumb {
  width: 100%;
  aspect-ratio: 16/9;
  background: var(--surface2);
  position: relative;
  overflow: hidden;
}
.card-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.card-thumb video {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.card-thumb-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  width: 100%;
  height: 100%;
  gap: 1px;
  background: var(--bg);
}
.card-thumb-grid img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.card-thumb-grid video {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.card-thumb-grid img:first-child {
  grid-column: 1; grid-row: 1 / 3;
}
.card-thumb-placeholder {
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 8px;
  color: var(--text3);
}
.card-thumb-placeholder svg { width: 32px; height: 32px; opacity: 0.4; }
.card-thumb-placeholder span { font-size: 13px; }

.photo-count-badge {
  position: absolute;
  bottom: 10px;
  right: 10px;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  padding: 4px 9px;
  border-radius: 20px;
}

.card-body { padding: 14px 14px 16px; }
.card-title {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.2px;
  margin-bottom: 4px;
}
.card-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 12px;
  margin-top: 8px;
}
.meta-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: var(--text2);
}
.meta-item svg { width: 13px; height: 13px; opacity: 0.7; flex-shrink: 0; }
.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 10px;
}
.tag {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 10px;
  background: rgba(10,132,255,0.15);
  color: var(--accent);
}

/* ─── EMPTY STATE ─── */
.empty-state {
  text-align: center;
  padding: 80px 40px;
  color: var(--text2);
}
.empty-state svg { width: 56px; height: 56px; opacity: 0.3; margin-bottom: 16px; }
.empty-state h3 { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.empty-state p { font-size: 15px; line-height: 1.5; }
.empty-cta {
  margin-top: 24px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 12px 28px;
  font-size: 15px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
}

/* ─── FAB ─── */
.fab {
  position: fixed;
  bottom: calc(var(--safe-bottom) + 20px);
  right: 20px;
  width: 54px; height: 54px;
  background: var(--accent);
  border: none;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(10,132,255,0.45);
  z-index: 50;
  transition: transform 0.12s, box-shadow 0.12s;
}
.fab:active { transform: scale(0.93); box-shadow: 0 2px 10px rgba(10,132,255,0.3); }
.fab svg { width: 24px; height: 24px; color: #fff; }

/* ─── EVENT DETAIL ─── */
#detail .photo-hero {
  width: 100%;
  aspect-ratio: 4/3;
  background: var(--surface);
  overflow: hidden;
  position: relative;
}
#detail .photo-hero img {
  width: 100%; height: 100%;
  object-fit: cover;
}
#detail .photo-hero video {
  width: 100%; height: 100%;
  object-fit: cover;
}
.detail-body { padding: 20px 20px; }
.detail-title {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.4px;
  margin-bottom: 6px;
}
.detail-desc {
  font-size: 15px;
  color: var(--text2);
  line-height: 1.6;
  margin-bottom: 20px;
}

.meta-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 4px 0;
  margin-bottom: 16px;
  border: 1px solid var(--border);
}
.meta-row {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  gap: 14px;
  border-bottom: 1px solid var(--border);
}
.meta-row:last-child { border-bottom: none; }
.meta-row-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.meta-row-icon svg { width: 17px; height: 17px; }
.meta-row-content { flex: 1; }
.meta-row-label { font-size: 12px; color: var(--text2); margin-bottom: 1px; }
.meta-row-value { font-size: 15px; font-weight: 500; }

.section-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 12px;
  letter-spacing: -0.3px;
}

/* ─── PHOTO GRID ─── */
.photo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
  margin-bottom: 20px;
}
.photo-grid-item {
  aspect-ratio: 1;
  overflow: hidden;
  background: var(--surface2);
  cursor: pointer;
  position: relative;
}
.photo-grid-item img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.2s;
}
.photo-grid-item video {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.2s;
}
.photo-grid-item:active img { transform: scale(0.95); }
.photo-grid-item:active video { transform: scale(0.95); }

/* ─── LIGHTBOX ─── */
#lightbox {
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 200;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
#lightbox.open { display: flex; }
#lightbox .lb-media {
  max-width: 100%;
  max-height: 75vh;
  object-fit: contain;
}
#lightbox .lb-meta {
  padding: 20px;
  text-align: center;
  color: var(--text2);
  font-size: 13px;
  line-height: 1.6;
}
#lightbox .lb-close {
  position: absolute;
  top: calc(var(--safe-top) + 8px);
  right: 20px;
  background: var(--surface);
  border: none;
  color: var(--text);
  width: 34px; height: 34px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 18px;
}
#lightbox .lb-nav {
  display: flex;
  gap: 20px;
  padding: 10px;
}
#lightbox .lb-nav button {
  background: var(--surface);
  border: none;
  color: var(--text);
  padding: 10px 24px;
  border-radius: 12px;
  font-size: 15px;
  font-family: var(--font);
  cursor: pointer;
}

/* ─── CREATE / EDIT SHEET ─── */
#create-screen {
  background: var(--bg2);
}
.form-section {
  padding: 0 16px;
  margin-bottom: 24px;
}
.form-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 0 4px;
  margin-bottom: 6px;
}
.form-field {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.form-input {
  width: 100%;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 16px;
  font-family: var(--font);
  padding: 13px 16px;
  display: block;
}
.form-input::placeholder { color: var(--text3); }
textarea.form-input {
  resize: none;
  min-height: 80px;
  line-height: 1.5;
}
.form-input-row {
  display: flex;
  align-items: center;
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  gap: 10px;
}
.form-input-row:last-child { border-bottom: none; }
.form-input-row svg { width: 18px; height: 18px; color: var(--text2); flex-shrink: 0; }
.form-input-row input {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 16px;
  font-family: var(--font);
  padding: 13px 0;
  flex: 1;
}
.form-input-row input::placeholder { color: var(--text3); }

/* Photo picker */
.photo-picker-area {
  min-height: 120px;
  background: var(--surface);
  border: 1.5px dashed var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  cursor: pointer;
  color: var(--accent);
  padding: 20px;
  transition: border-color 0.15s, background 0.15s;
}
.photo-picker-area:active { background: var(--surface2); }
.photo-picker-area svg { width: 28px; height: 28px; }
.photo-picker-area span { font-size: 14px; font-weight: 500; }
.photo-picker-area small { font-size: 12px; color: var(--text3); }
#photo-input { display: none; }
#album-input { display: none; }
.album-import-btn {
  width: 100%;
  margin-top: 8px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text2);
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 13px;
  font-family: var(--font);
}
.album-import-btn:active { background: var(--surface2); }
.media-limit-note {
  margin-top: 8px;
  font-size: 12px;
  color: var(--text3);
  line-height: 1.4;
}
.media-usage {
  margin-top: 6px;
  font-size: 12px;
  color: var(--text2);
}
.media-usage.warn { color: #ffd166; }
.media-usage.danger { color: #ff6b6b; }
.import-progress {
  margin-top: 8px;
  height: 8px;
  border-radius: 999px;
  background: var(--surface2);
  overflow: hidden;
  display: none;
}
.import-progress.show { display: block; }
.import-progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent), #4ea1ff);
  transition: width 0.15s ease;
}

.picked-previews {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
  margin-top: 10px;
}
.picked-preview {
  aspect-ratio: 1;
  border-radius: 8px;
  overflow: hidden;
  background: var(--surface2);
  position: relative;
}
.picked-preview img, .picked-preview video { width:100%; height:100%; object-fit:cover; display:block; }
.picked-preview .remove-photo {
  position: absolute;
  top: 2px; right: 2px;
  background: rgba(0,0,0,0.7);
  border: none;
  color: #fff;
  width: 20px; height: 20px;
  border-radius: 50%;
  font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}

.save-btn {
  width: calc(100% - 32px);
  margin: 0 16px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 15px;
  font-size: 16px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: opacity 0.15s;
}
.save-btn:active { opacity: 0.8; }
.danger-btn {
  width: calc(100% - 32px);
  margin: 8px 16px 0;
  background: rgba(255,69,58,0.12);
  color: var(--accent-red);
  border: none;
  border-radius: var(--radius);
  padding: 15px;
  font-size: 16px;
  font-weight: 500;
  font-family: var(--font);
  cursor: pointer;
}

/* ─── STATS BAR ─── */
.stats-bar {
  display: flex;
  gap: 10px;
  padding: 0 16px 14px;
}
.stat-card {
  flex: 1;
  background: var(--surface);
  border-radius: 14px;
  padding: 12px 14px;
  border: 1px solid var(--border);
}
.stat-num { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.stat-label { font-size: 11px; color: var(--text2); margin-top: 1px; }

/* ─── INSTALL HELPER ─── */
.install-helper {
  margin: 0 16px 12px;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--surface);
  display: none;
  gap: 10px;
  align-items: center;
  justify-content: space-between;
}
.install-helper.show { display: flex; }
.install-helper-text {
  font-size: 12px;
  color: var(--text2);
  line-height: 1.35;
}
.install-helper-actions {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
.install-helper-btn {
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  border-radius: 9px;
  padding: 8px 10px;
  font-size: 12px;
  font-family: var(--font);
}
.install-helper-btn.primary {
  border-color: transparent;
  background: var(--accent);
  color: #fff;
}

/* ─── TOAST ─── */
.toast {
  position: fixed;
  bottom: calc(var(--safe-bottom) + 90px);
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(50,50,52,0.95);
  color: #fff;
  padding: 11px 22px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 500;
  opacity: 0;
  transition: opacity 0.25s, transform 0.25s;
  z-index: 300;
  white-space: nowrap;
  backdrop-filter: blur(10px);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─── DETAIL ACTIONS ─── */
.detail-actions {
  display: flex;
  gap: 10px;
  padding: 0 20px 20px;
}
.detail-action-btn {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 12px;
  padding: 12px;
  font-size: 14px;
  font-weight: 500;
  font-family: var(--font);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.detail-action-btn svg { width: 16px; height: 16px; }
.detail-action-btn.red { color: var(--accent-red); }

</style>
</head>
<body>

<!-- ══════════════════ HOME ══════════════════ -->
<div class="screen active" id="home">
  <div class="navbar navbar-large" id="home-navbar">
    <div>
      <div class="large-title">EventCata</div>
      <div class="subtitle" id="home-subtitle">Loading…</div>
    </div>
  </div>
  <div class="scroll" id="home-scroll">
    <div class="install-helper" id="install-helper">
      <div class="install-helper-text" id="install-helper-text"></div>
      <div class="install-helper-actions">
        <button class="install-helper-btn primary" id="install-helper-action" type="button">Install</button>
        <button class="install-helper-btn" id="install-helper-dismiss" type="button">Later</button>
      </div>
    </div>
    <div class="search-wrap">
      <div class="search-bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="Search by name, sponsor, or date…">
      </div>
    </div>

    <div class="filter-row" id="filter-row">
      <div class="pill active" data-filter="all">All</div>
    </div>

<script>
// ══════════════════════════════════════════
//  DATA LAYER — IndexedDB
// ══════════════════════════════════════════
const DB_NAME = 'EventCatalogue', DB_VER = 1;
let db;

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('events')) {
        const store = d.createObjectStore('events', { keyPath: 'id' });
        store.createIndex('date', 'date', { unique: false });
      }
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = () => rej(req.error);
  });
}

function dbAll() {
  return new Promise((res, rej) => {
    const tx = db.transaction('events', 'readonly');
    const req = tx.objectStore('events').getAll();
    req.onsuccess = () => res(req.result || []);
    req.onerror = () => rej(req.error);
  });
}

function dbGet(id) {
  return new Promise((res, rej) => {
    const tx = db.transaction('events', 'readonly');
    const req = tx.objectStore('events').get(id);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}

function dbPut(event) {
  return new Promise((res, rej) => {
    const tx = db.transaction('events', 'readwrite');
    const req = tx.objectStore('events').put(event);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}

function dbDelete(id) {
  return new Promise((res, rej) => {
    const tx = db.transaction('events', 'readwrite');
    const req = tx.objectStore('events').delete(id);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}

// ══════════════════════════════════════════
//  EXIF READER
// ══════════════════════════════════════════
function readExif(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const view = new DataView(e.target.result);
        if (view.getUint16(0, false) !== 0xFFD8) return resolve({});
        let offset = 2, len = view.byteLength;
        while (offset < len) {
          const marker = view.getUint16(offset, false);
          offset += 2;
          if (marker === 0xFFE1) {
            const exifLen = view.getUint16(offset, false);
            const exifData = new DataView(e.target.result, offset + 2, exifLen - 2);
            resolve(parseExifData(exifData));
            return;
          }
          offset += view.getUint16(offset, false);
        }
        resolve({});
      } catch { resolve({}); }
    };
    reader.readAsArrayBuffer(file.slice(0, 131072));
  });
}

function parseExifData(view) {
  try {
    if (view.getUint32(0, false) !== 0x45786966) return {};
    const little = view.getUint16(6) === 0x4949;
    let offset = view.getUint32(10, little) + 6;
    const tags = {};
    const count = view.getUint16(offset, little); offset += 2;
    const TAG = {
      0x9003: 'dateTime', 0x8827: 'iso', 0x829A: 'exposure',
      0x829D: 'fNumber', 0x920A: 'focalLen',
      0x0112: 'orientation', 0x8825: 'gpsOffset'
    };
    for (let i = 0; i < count; i++) {
      const tag = view.getUint16(offset, little);
      const type = view.getUint16(offset + 2, little);
      const cnt = view.getUint32(offset + 4, little);
      const valOffset = offset + 8;
      if (tag === 0x9003) {
        let str = '';
        for (let j = 0; j < cnt - 1; j++) str += String.fromCharCode(view.getUint8(valOffset + j));
        tags.dateTime = str;
      }
      if (tag === 0x8827) tags.iso = view.getUint16(valOffset, little);
      if (tag === 0x829A) {
        const n = view.getUint32(valOffset, little), d = view.getUint32(valOffset + 4, little);
        tags.exposure = d ? `1/${Math.round(d / n)}s` : null;
      }
      if (tag === 0x829D) {
        const n = view.getUint32(valOffset, little), d = view.getUint32(valOffset + 4, little);
        tags.fNumber = d ? `f/${(n / d).toFixed(1)}` : null;
      }
      if (tag === 0x920A) {
        const n = view.getUint32(valOffset, little), d = view.getUint32(valOffset + 4, little);
        tags.focalLen = d ? `${Math.round(n / d)}mm` : null;
      }
      if (tag === 0x8825) tags.gpsOffset = view.getUint32(valOffset, little) + 6;
      offset += 12;
    }
    // GPS
    if (tags.gpsOffset) {
      try {
        const gc = view.getUint16(tags.gpsOffset, little);
        let lat = null, lon = null, latRef = 'N', lonRef = 'E';
        for (let i = 0; i < gc; i++) {
          const go = tags.gpsOffset + 2 + i * 12;
          const gt = view.getUint16(go, little);
          const gvo = go + 8;
          if (gt === 1) latRef = String.fromCharCode(view.getUint8(gvo));
          if (gt === 3) lonRef = String.fromCharCode(view.getUint8(gvo));
          if (gt === 2 || gt === 4) {
            const deg = view.getUint32(gvo, little) / view.getUint32(gvo + 4, little);
            const min = view.getUint32(gvo + 8, little) / view.getUint32(gvo + 12, little);
            const sec = view.getUint32(gvo + 16, little) / view.getUint32(gvo + 20, little);
            const val = deg + min / 60 + sec / 3600;
            if (gt === 2) lat = val; else lon = val;
          }
        }
        if (lat && lon) {
          tags.lat = latRef === 'S' ? -lat : lat;
          tags.lon = lonRef === 'W' ? -lon : lon;
        }
      } catch {}
    }
    return tags;
  } catch { return {}; }
}

function formatExifDate(str) {
  if (!str) return null;
  // "2024:06:15 14:22:30"
  const m = str.match(/(\d{4}):(\d{2}):(\d{2}) (\d{2}):(\d{2}):(\d{2})/);
  if (!m) return null;
  return { date: `${m[1]}-${m[2]}-${m[3]}`, time: `${m[4]}:${m[5]}` };
}

async function reverseGeocode(lat, lon) {
  const roundedLat = Number(lat).toFixed(4);
  const roundedLon = Number(lon).toFixed(4);
  const cacheKey = `${roundedLat},${roundedLon}`;
  if (!window.__geoCache) window.__geoCache = new Map();
  if (window.__geoCache.has(cacheKey)) return window.__geoCache.get(cacheKey);

  const ctrl = new AbortController();
  const timeout = setTimeout(() => ctrl.abort(), 4500);
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${roundedLat}&lon=${roundedLon}&format=json`, {
      headers: { 'Accept-Language': 'en' },
      signal: ctrl.signal
    });
    if (!r.ok) return null;
    const d = await r.json();
    const a = d.address || {};
    const result = [a.city || a.town || a.village || a.county, a.country].filter(Boolean).join(', ') || null;
    window.__geoCache.set(cacheKey, result);
    return result;
  } catch {
    return null;
  } finally {
    clearTimeout(timeout);
  }
}

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let allEvents = [];
let currentEventId = null;
let editMode = false;
let pickedFiles = []; // {file, dataUrl, exif, mediaType}
let lbPhotos = [], lbIndex = 0;
let activeFilter = 'all';
let deferredInstallPrompt = null;
const MAX_ITEMS_PER_EVENT = 200;
const MAX_IMAGE_BYTES = 12 * 1024 * 1024; // 12MB
const MAX_VIDEO_BYTES = 80 * 1024 * 1024; // 80MB
const MAX_TOTAL_BYTES_PER_EVENT = 350 * 1024 * 1024; // 350MB

function trackEvent(name, params = {}) {
  if (typeof window.gtag !== 'function') return;
  window.gtag('event', name, params);
}

function formatBytes(bytes) {
  if (!bytes) return '0 MB';
  const mb = bytes / (1024 * 1024);
  if (mb >= 1024) return `${(mb / 1024).toFixed(2)} GB`;
  return `${mb.toFixed(1)} MB`;
}

function updateMediaLimitsUI() {
  const note = document.getElementById('media-limit-note');
  const usage = document.getElementById('media-usage');
  const totalBytes = pickedFiles.reduce((sum, p) => sum + (p.file?.size || 0), 0);
  const countRatio = pickedFiles.length / MAX_ITEMS_PER_EVENT;
  const sizeRatio = totalBytes / MAX_TOTAL_BYTES_PER_EVENT;
  const ratio = Math.max(countRatio, sizeRatio);

  note.textContent = `Limits: up to ${MAX_ITEMS_PER_EVENT} items · images <= ${formatBytes(MAX_IMAGE_BYTES)} · videos <= ${formatBytes(MAX_VIDEO_BYTES)} · total <= ${formatBytes(MAX_TOTAL_BYTES_PER_EVENT)}.`;
  usage.textContent = `Current: ${pickedFiles.length}/${MAX_ITEMS_PER_EVENT} items · ${formatBytes(totalBytes)} / ${formatBytes(MAX_TOTAL_BYTES_PER_EVENT)}.`;
  usage.classList.remove('warn', 'danger');
  if (ratio >= 0.95) usage.classList.add('danger');
  else if (ratio >= 0.8) usage.classList.add('warn');
}

function setImportProgress(done, total) {
  const wrap = document.getElementById('import-progress');
  const bar = document.getElementById('import-progress-bar');
  if (!total || done >= total) {
    bar.style.width = '100%';
    setTimeout(() => {
      wrap.classList.remove('show');
      bar.style.width = '0%';
    }, 450);
    return;
  }
  const pct = Math.max(0, Math.min(100, Math.round((done / total) * 100)));
  wrap.classList.add('show');
  bar.style.width = `${pct}%`;
}

function isIos() {
  return /iphone|ipad|ipod/i.test(navigator.userAgent);
}

function isStandaloneMode() {
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}

function hideInstallHelper() {
  const helper = document.getElementById('install-helper');
  helper.classList.remove('show');
  localStorage.setItem('install-helper-dismissed', '1');
}

function showInstallHelper(text, actionLabel, actionHandler) {
  const helper = document.getElementById('install-helper');
  const textEl = document.getElementById('install-helper-text');
  const actionBtn = document.getElementById('install-helper-action');
  const dismissBtn = document.getElementById('install-helper-dismiss');

  textEl.textContent = text;
  actionBtn.textContent = actionLabel;
  actionBtn.onclick = actionHandler;
  dismissBtn.onclick = hideInstallHelper;
  helper.classList.add('show');
}

function initInstallHelper() {
  if (isStandaloneMode() || localStorage.getItem('install-helper-dismissed') === '1') return;

  if (isIos()) {
    showInstallHelper(
      'To install this app, tap the "...", then tap Share, then tap "Add to Home Screen".',
      'How',
      () => showToast('Tap "...", then Share, then Add to Home Screen')
    );
  }

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredInstallPrompt = e;
    showInstallHelper('Install EventCata for quick access.', 'Install', async () => {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      const choice = await deferredInstallPrompt.userChoice;
      if (choice.outcome === 'accepted') hideInstallHelper();
      deferredInstallPrompt = null;
    });
  });

  window.addEventListener('appinstalled', () => {
    hideInstallHelper();
    showToast('EventCata installed');
  });
}

function isVideoMedia(item) {
  return (item?.mediaType || '').startsWith('video/');
}

function renderMediaThumb(item, lazy = false) {
  if (isVideoMedia(item)) {
    return `<video src="${item.dataUrl}" muted playsinline preload="metadata"></video>`;
  }
  return `<img src="${item.dataUrl}" alt="" ${lazy ? 'loading="lazy"' : ''}>`;
}

function renderMediaForLightbox(item) {
  if (isVideoMedia(item)) {
    return `<video class="lb-media" src="${item.dataUrl}" controls playsinline></video>`;
  }
  return `<img class="lb-media" src="${item.dataUrl}" alt="">`;
}

function matchesDateQuery(rawDate, query) {
  if (!rawDate || !query) return false;
  const q = query.trim().toLowerCase();
  if (!q) return false;

  const d = new Date(`${rawDate}T12:00:00`);
  if (Number.isNaN(d.getTime())) return false;

  const year = String(d.getFullYear());
  const monthNum = String(d.getMonth() + 1);
  const monthNumPadded = monthNum.padStart(2, '0');
  const day = String(d.getDate());
  const dayPadded = day.padStart(2, '0');

  const monthShort = d.toLocaleDateString('en-GB', { month: 'short' }).toLowerCase();
  const monthLong = d.toLocaleDateString('en-GB', { month: 'long' }).toLowerCase();

  const formattedIso = `${year}-${monthNumPadded}-${dayPadded}`;
  const formattedGbSlash = `${dayPadded}/${monthNumPadded}/${year}`;
  const formattedGbDash = `${dayPadded}-${monthNumPadded}-${year}`;

  return [
    year, monthNum, monthNumPadded, day, dayPadded,
    monthShort, monthLong,
    formattedIso, formattedGbSlash, formattedGbDash
  ].some(part => part.includes(q));
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
openDB().then(async () => {
  allEvents = await dbAll();
  renderHome();
  updateMediaLimitsUI();
  initInstallHelper();
  trackEvent('app_loaded', { existing_events: allEvents.length });
});

// ══════════════════════════════════════════
//  RENDER HOME
// ══════════════════════════════════════════
function renderHome(filter, search) {
  const list = document.getElementById('events-list');
  const statsBar = document.getElementById('stats-bar');
  const subtitle = document.getElementById('home-subtitle');

  let events = [...allEvents].sort((a, b) => (b.date || '').localeCompare(a.date || ''));

  // Tag filters
  const allTags = new Set();
  allEvents.forEach(e => (e.tags || []).forEach(t => allTags.add(t)));
  renderFilters([...allTags]);

  // Apply filter
  if (activeFilter !== 'all') events = events.filter(e => (e.tags || []).includes(activeFilter));

  // Apply search: name, sponsor/client, and date parts (day/month/year)
  const q = document.getElementById('search-input').value.toLowerCase();
  if (q) events = events.filter(e =>
    (e.name || '').toLowerCase().includes(q) ||
    (e.client || '').toLowerCase().includes(q) ||
    matchesDateQuery(e.date, q)
  );

  subtitle.textContent = `${allEvents.length} event${allEvents.length !== 1 ? 's' : ''}`;

  if (allEvents.length > 0) {
    statsBar.style.display = 'flex';
    document.getElementById('stat-events').textContent = allEvents.length;
    const totalPhotos = allEvents.reduce((s, e) => s + (e.photos || []).length, 0);
    document.getElementById('stat-photos').textContent = totalPhotos;
    const years = new Set(allEvents.map(e => e.date ? e.date.slice(0, 4) : null).filter(Boolean));
    document.getElementById('stat-years').textContent = years.size || '—';
  } else {
    statsBar.style.display = 'none';
  }

  if (events.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        <h3>${allEvents.length === 0 ? 'No Events Yet' : 'No Results'}</h3>
        <p>${allEvents.length === 0 ? 'Tap + to create your first event and start building your catalogue.' : 'Try a different search or filter.'}</p>
        ${allEvents.length === 0 ? '<button class="empty-cta" onclick="openCreate()">Create First Event</button>' : ''}
      </div>`;
    return;
  }

  // Group by year
  const byYear = {};
  events.forEach(e => {
    const yr = e.date ? e.date.slice(0, 4) : 'Undated';
    if (!byYear[yr]) byYear[yr] = [];
    byYear[yr].push(e);
  });

  list.innerHTML = Object.entries(byYear).sort((a, b) => b[0].localeCompare(a[0])).map(([yr, evs]) => `
    <div class="year-section">
      <div class="year-label">${yr}</div>
      ${evs.map(ev => renderCard(ev)).join('')}
    </div>
  `).join('');
}

function renderCard(ev) {
  const photos = ev.photos || [];
  let thumbHtml;
  if (photos.length === 0) {
    thumbHtml = `<div class="card-thumb-placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <span>No photos yet</span>
    </div>`;
  } else if (photos.length === 1) {
    thumbHtml = renderMediaThumb(photos[0]);
  } else {
    thumbHtml = `<div class="card-thumb-grid">
      ${photos.slice(0, 3).map(p => renderMediaThumb(p)).join('')}
    </div>`;
  }

  const dateStr = ev.date ? new Date(ev.date + 'T12:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : '';
  const tags = (ev.tags || []).slice(0, 3).map(t => `<div class="tag">${t}</div>`).join('');

  // Get earliest camera time from EXIF
  let timeStr = '';
  if (photos.length > 0) {
    const times = photos.map(p => p.exif?.dateTime).filter(Boolean).sort();
    if (times.length > 0) {
      const parsed = formatExifDate(times[0]);
      if (parsed) timeStr = parsed.time;
    }
  }

  return `
  <div class="event-card" onclick="openDetail('${ev.id}')">
    <div class="card-thumb">
      ${thumbHtml}
      ${photos.length > 0 ? `<div class="photo-count-badge">${photos.length} item${photos.length !== 1 ? 's' : ''}</div>` : ''}
    </div>
    <div class="card-body">
      <div class="card-title">${ev.name || 'Untitled Event'}</div>
      <div class="card-meta">
        ${dateStr ? `<div class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${dateStr}${timeStr ? ' · ' + timeStr : ''}</div>` : ''}
        ${ev.location ? `<div class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>${ev.location}</div>` : ''}
        ${ev.client ? `<div class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${ev.client}</div>` : ''}
      </div>
      ${tags ? `<div class="card-tags">${tags}</div>` : ''}
    </div>
  </div>`;
}

function renderFilters(tags) {
  const row = document.getElementById('filter-row');
  const pills = ['<div class="pill' + (activeFilter === 'all' ? ' active' : '') + '" data-filter="all" onclick="setFilter(\'all\')">All</div>',
    ...tags.map(t => `<div class="pill${activeFilter === t ? ' active' : ''}" data-filter="${t}" onclick="setFilter('${t}')">${t}</div>`)];
  row.innerHTML = pills.join('');
}

function setFilter(f) {
  activeFilter = f;
  renderHome();
}

document.getElementById('search-input').addEventListener('input', () => renderHome());

// ══════════════════════════════════════════
//  DETAIL
// ══════════════════════════════════════════
async function openDetail(id) {
  currentEventId = id;
  const ev = await dbGet(id);
  const photos = ev.photos || [];

  document.getElementById('detail-nav-title').textContent = ev.name || '';
  document.getElementById('detail-title').textContent = ev.name || 'Untitled Event';
  document.getElementById('detail-desc').textContent = ev.description || '';
  if (!ev.description) document.getElementById('detail-desc').style.display = 'none';
  else document.getElementById('detail-desc').style.display = '';

  // Hero
  const hero = document.getElementById('detail-hero');
  const heroMedia = document.getElementById('detail-hero-media');
  if (photos.length > 0) {
    hero.style.display = '';
    heroMedia.innerHTML = renderMediaThumb(photos[0]);
  } else {
    hero.style.display = 'none';
    heroMedia.innerHTML = '';
  }

  // Meta card
  const mc = document.getElementById('detail-meta-card');
  const dateStr = ev.date ? new Date(ev.date + 'T12:00:00').toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }) : null;

  // Collect EXIF summary from photos
  const isos = photos.map(p => p.exif?.iso).filter(Boolean);
  const shutters = photos.map(p => p.exif?.exposure).filter(Boolean);
  const apertures = photos.map(p => p.exif?.fNumber).filter(Boolean);
  const focals = photos.map(p => p.exif?.focalLen).filter(Boolean);
  const times = photos.map(p => p.exif?.dateTime).filter(Boolean).sort();
  const gpsLocs = photos.map(p => p.exif?.gpsLocation).filter(Boolean);

  let timeRange = '';
  if (times.length >= 2) {
    const t0 = formatExifDate(times[0]);
    const t1 = formatExifDate(times[times.length - 1]);
    if (t0 && t1) timeRange = `${t0.time} – ${t1.time}`;
  } else if (times.length === 1) {
    const t0 = formatExifDate(times[0]);
    if (t0) timeRange = t0.time;
  }

  const metaRows = [];
  if (dateStr) metaRows.push({ icon: '#icon-cal', color: '#FF9F0A', label: 'Date', value: dateStr + (timeRange ? ` · ${timeRange}` : '') });
  if (ev.location || gpsLocs[0]) metaRows.push({ icon: '#icon-pin', color: '#FF453A', label: 'Location', value: ev.location || gpsLocs[0] });
  if (ev.client) metaRows.push({ icon: '#icon-person', color: '#30D158', label: 'Client / Organiser', value: ev.client });
  if (photos.length > 0) metaRows.push({ icon: '#icon-photo', color: '#0A84FF', label: 'Media', value: `${photos.length} item${photos.length !== 1 ? 's' : ''}` });
  if (apertures.length > 0) metaRows.push({ icon: '#icon-cam', color: '#BF5AF2', label: 'Camera', value: [apertures[0], shutters[0], isos[0] ? `ISO ${isos[0]}` : null, focals[0]].filter(Boolean).join(' · ') });

  mc.innerHTML = metaRows.map(r => `
    <div class="meta-row">
      <div class="meta-row-icon" style="background:${r.color}22">
        <svg viewBox="0 0 24 24" fill="none" stroke="${r.color}" stroke-width="2">${getIconPath(r.icon)}</svg>
      </div>
      <div class="meta-row-content">
        <div class="meta-row-label">${r.label}</div>
        <div class="meta-row-value">${r.value}</div>
      </div>
    </div>`).join('');

  // Tags
  if (ev.tags && ev.tags.length > 0) {
    mc.innerHTML += `<div class="meta-row">
      <div class="meta-row-icon" style="background:#0A84FF22">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0A84FF" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      </div>
      <div class="meta-row-content">
        <div class="meta-row-label">Tags</div>
        <div class="meta-row-value">${ev.tags.join(', ')}</div>
      </div>
    </div>`;
  }

  // Photo grid
  const grid = document.getElementById('detail-photo-grid');
  const ptitle = document.getElementById('detail-photos-title');
  if (photos.length > 0) {
    ptitle.style.display = '';
    lbPhotos = photos;
    grid.innerHTML = photos.map((p, i) => `
      <div class="photo-grid-item" onclick="openLightbox(${i})">
        ${renderMediaThumb(p, true)}
      </div>`).join('');
  } else {
    ptitle.style.display = 'none';
    grid.innerHTML = '';
  }

  document.getElementById('detail-scroll').scrollTop = 0;
  navigate('detail');
}

function getIconPath(id) {
  const map = {
    '#icon-cal': '<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
    '#icon-pin': '<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>',
    '#icon-person': '<path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>',
    '#icon-photo': '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>',
    '#icon-cam': '<path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/>'
  };
  return map[id] || '';
}

// ══════════════════════════════════════════
//  LIGHTBOX
// ══════════════════════════════════════════
function openLightbox(i) {
  lbIndex = i;
  showLb();
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
function lbPrev() { lbIndex = (lbIndex - 1 + lbPhotos.length) % lbPhotos.length; showLb(); }
function lbNext() { lbIndex = (lbIndex + 1) % lbPhotos.length; showLb(); }
function showLb() {
  const p = lbPhotos[lbIndex];
  document.getElementById('lb-media-wrap').innerHTML = renderMediaForLightbox(p);
  const ex = p.exif || {};
  const parts = [];
  if (ex.dateTime) { const d = formatExifDate(ex.dateTime); if (d) parts.push(d.date + ' ' + d.time); }
  if (ex.fNumber) parts.push(ex.fNumber);
  if (ex.exposure) parts.push(ex.exposure);
  if (ex.iso) parts.push(`ISO ${ex.iso}`);
  if (ex.focalLen) parts.push(ex.focalLen);
  document.getElementById('lb-meta').textContent = parts.join('  ·  ') || '';
}

// ══════════════════════════════════════════
//  CREATE / EDIT
// ══════════════════════════════════════════
function openCreate() {
  editMode = false;
  currentEventId = null;
  pickedFiles = [];
  clearForm();
  document.getElementById('create-screen-title').textContent = 'New Event';
  document.getElementById('save-btn').textContent = 'Save Event';
  document.getElementById('delete-btn').style.display = 'none';
  navigate('create-screen');
}

async function openEdit() {
  editMode = true;
  const ev = await dbGet(currentEventId);
  clearForm();
  document.getElementById('field-name').value = ev.name || '';
  document.getElementById('field-date').value = ev.date || '';
  document.getElementById('field-location').value = ev.location || '';
  document.getElementById('field-client').value = ev.client || '';
  document.getElementById('field-desc').value = ev.description || '';
  document.getElementById('field-tags').value = (ev.tags || []).join(', ');
  pickedFiles = (ev.photos || []).map(p => ({ dataUrl: p.dataUrl, exif: p.exif, mediaType: p.mediaType || 'image/*', existing: true }));
  renderPickedPreviews();
  updateMediaLimitsUI();
  document.getElementById('create-screen-title').textContent = 'Edit Event';
  document.getElementById('save-btn').textContent = 'Update Event';
  document.getElementById('delete-btn').style.display = '';
  navigate('create-screen');
}

function clearForm() {
  ['field-name','field-date','field-location','field-client','field-desc','field-tags'].forEach(id => document.getElementById(id).value = '');
  pickedFiles = [];
  document.getElementById('picked-previews').innerHTML = '';
  document.getElementById('photo-input').value = '';
  document.getElementById('album-input').value = '';
  updateMediaLimitsUI();
}

function cancelCreate() {
  if (editMode) goBack('create-screen', 'detail');
  else goBack('create-screen', 'home');
}

// Media picking (single/multi and album-folder import)
async function processPickedFiles(files) {
  const mediaFiles = files.filter((f) => (f.type || '').startsWith('image/') || (f.type || '').startsWith('video/'));
  if (mediaFiles.length === 0) {
    showToast('No supported media found');
    return;
  }

  let totalBytes = pickedFiles.reduce((sum, p) => sum + (p.file?.size || 0), 0);
  let added = 0;
  let skippedLarge = 0;
  let skippedDup = 0;
  let skippedLimit = 0;

  showToast(`Reading ${mediaFiles.length} media item${mediaFiles.length !== 1 ? 's' : ''}...`);
  trackEvent('media_import_started', { attempted_items: mediaFiles.length });
  setImportProgress(0, mediaFiles.length);
  for (let i = 0; i < mediaFiles.length; i++) {
    const file = mediaFiles[i];
    const isVideo = (file.type || '').startsWith('video/');
    const maxSize = isVideo ? MAX_VIDEO_BYTES : MAX_IMAGE_BYTES;

    if (pickedFiles.length >= MAX_ITEMS_PER_EVENT) { skippedLimit++; setImportProgress(i + 1, mediaFiles.length); continue; }
    if (file.size > maxSize) { skippedLarge++; setImportProgress(i + 1, mediaFiles.length); continue; }
    if (totalBytes + file.size > MAX_TOTAL_BYTES_PER_EVENT) { skippedLimit++; setImportProgress(i + 1, mediaFiles.length); continue; }

    const duplicate = pickedFiles.some(
      (p) => p.file?.name === file.name && p.file?.size === file.size && p.file?.lastModified === file.lastModified
    );
    if (duplicate) { skippedDup++; setImportProgress(i + 1, mediaFiles.length); continue; }

    const dataUrl = await fileToDataUrl(file);
    const mediaType = file.type || '';
    const exif = mediaType.startsWith('image/') ? await readExif(file) : {};
    if (exif.lat && exif.lon) {
      exif.gpsLocation = await reverseGeocode(exif.lat, exif.lon);
    }
    pickedFiles.push({ file, dataUrl, exif, mediaType });
    totalBytes += file.size;
    added++;
    setImportProgress(i + 1, mediaFiles.length);

    if ((i + 1) % 10 === 0) {
      showToast(`Processed ${i + 1}/${mediaFiles.length}...`);
      await new Promise((r) => setTimeout(r, 0));
    }
  }
  renderPickedPreviews();
  updateMediaLimitsUI();
  let msg = `${pickedFiles.length} media item${pickedFiles.length !== 1 ? 's' : ''} ready`;
  if (added === 0) msg = 'No new media added';
  if (skippedDup > 0) msg += ` · ${skippedDup} duplicate${skippedDup !== 1 ? 's' : ''} skipped`;
  if (skippedLarge > 0) msg += ` · ${skippedLarge} too large`;
  if (skippedLimit > 0) msg += ` · ${skippedLimit} over event limit`;
  showToast(msg);
  trackEvent('media_import_completed', {
    attempted_items: mediaFiles.length,
    added_items: added,
    skipped_duplicates: skippedDup,
    skipped_too_large: skippedLarge,
    skipped_over_limit: skippedLimit,
    total_selected_items: pickedFiles.length
  });
}

document.getElementById('photo-input').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files);
  await processPickedFiles(files);
  e.target.value = '';
});

document.getElementById('album-input').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files);
  await processPickedFiles(files);
  e.target.value = '';
});

function renderPickedPreviews() {
  const el = document.getElementById('picked-previews');
  el.innerHTML = pickedFiles.map((p, i) => `
    <div class="picked-preview">
      ${renderMediaThumb(p)}
      <button class="remove-photo" onclick="removePhoto(${i})">✕</button>
    </div>`).join('');
}

function removePhoto(i) {
  pickedFiles.splice(i, 1);
  renderPickedPreviews();
  updateMediaLimitsUI();
}

function fileToDataUrl(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onerror = () => rej(r.error || new Error('Failed to read file'));
    r.onload = e => res(e.target.result);
    r.readAsDataURL(file);
  });
}

async function saveEvent() {
  const name = document.getElementById('field-name').value.trim();
  if (!name) { showToast('Please enter an event name'); return; }

  const tagsRaw = document.getElementById('field-tags').value;
  const tags = tagsRaw.split(',').map(t => t.trim()).filter(Boolean);

  const photos = pickedFiles.map(p => ({ dataUrl: p.dataUrl, exif: p.exif || {}, mediaType: p.mediaType || 'image/*' }));

  const ev = {
    id: editMode ? currentEventId : ('ev_' + Date.now()),
    name,
    date: document.getElementById('field-date').value,
    location: document.getElementById('field-location').value.trim(),
    client: document.getElementById('field-client').value.trim(),
    description: document.getElementById('field-desc').value.trim(),
    tags,
    photos,
    updatedAt: Date.now()
  };

  try {
    await dbPut(ev);
  } catch (err) {
    const isQuota = (err && (err.name === 'QuotaExceededError' || err.name === 'UnknownError'));
    if (isQuota) {
      showToast('Storage full. Reduce media count/size and try again.');
      trackEvent('event_save_failed_quota', { selected_items: pickedFiles.length });
      return;
    }
    showToast('Could not save event. Please try again.');
    trackEvent('event_save_failed', { selected_items: pickedFiles.length });
    return;
  }
  allEvents = await dbAll();
  renderHome();
  showToast(editMode ? 'Event updated' : 'Event saved');
  trackEvent(editMode ? 'event_updated' : 'event_created', {
    media_items: photos.length,
    has_date: !!ev.date,
    has_sponsor: !!ev.client
  });

  if (editMode) {
    await openDetail(ev.id);
    goBack('create-screen', 'detail');
  } else {
    goBack('create-screen', 'home');
  }
}

async function deleteCurrentEvent() {
  if (!confirm('Delete this event? This cannot be undone.')) return;
  await dbDelete(currentEventId);
  allEvents = await dbAll();
  renderHome();
  showToast('Event deleted');
  trackEvent('event_deleted');
  // Go back to home
  document.querySelectorAll('.screen').forEach(s => { s.classList.remove('active','behind'); });
  document.getElementById('home').classList.add('active');
}

function shareEvent() { showToast('Share: screenshot this screen to share'); }

// ══════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════
function navigate(toId) {
  const screens = document.querySelectorAll('.screen');
  screens.forEach(s => {
    if (s.classList.contains('active')) s.classList.add('behind');
    s.classList.remove('active');
  });
  document.getElementById(toId).classList.add('active');
  document.getElementById(toId).classList.remove('behind');
}

function goBack(fromId, toId) {
  document.getElementById(fromId).classList.remove('active', 'behind');
  document.getElementById(toId).classList.remove('behind');
  document.getElementById(toId).classList.add('active');
}

// Swipe back gesture
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (dx > 80 && touchStartX < 30) {
    const active = document.querySelector('.screen.active');
    if (active && active.id === 'detail') goBack('detail', 'home');
    if (active && active.id === 'create-screen') cancelCreate();
  }
}, { passive: true });

// ══════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
