<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Offline — EventCata</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a84ff">
  <style>
    body{font-family:Inter,-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      background:#070b13;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
    .card{max-width:680px;padding:28px;border-radius:12px;background:linear-gradient(180deg,rgba(255,255,255,0.03),rgba(255,255,255,0.02));border:1px solid rgba(255,255,255,0.06);text-align:center;box-shadow:0 12px 40px rgba(0,0,0,0.5)}
    h1{margin:0 0 8px;font-size:20px}
    p{margin:0 0 16px;color:rgba(255,255,255,0.8)}
    a{display:inline-block;padding:10px 18px;border-radius:10px;background:#0A84FF;color:#fff;text-decoration:none}
    small{display:block;margin-top:10px;color:rgba(255,255,255,0.45)}
  </style>
</head>
<body>
  <div class="card" role="main">
    <h1>You're offline</h1>
    <p>EventCata can't reach the network right now. You can still browse saved events and view stored media.</p>
    <a href="/" onclick="location.reload();return false;">Try reconnect / Reload</a>
    <small>If the app still shows offline, check your network or restart the app.</small>
  </div>
</body>
</html>
